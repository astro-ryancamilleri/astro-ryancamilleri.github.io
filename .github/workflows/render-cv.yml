# RenderCV Workflow

name: Render CV

on:
  push:
    branches:
      - main

jobs:
  RenderCV:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Render CV
        run: |
          cv_file="your_cv_file_here"
          settings="your_settings_here"
          rendercv render $cv_file --settings $settings 2>&1 || { echo "RenderCV failed with exit code $?"; exit 1; }  

      - name: Upload CV
        uses: actions/upload-artifact@v2
        with:
          name: Rendered CV
          path: $cv_file